<div class="app-shell">
  <header class="app-header">
    <!-- Brand -->
    <a routerLink="/dashboard" class="header-brand">
      <div class="brand-logo">
        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
          <rect x="3" y="3" width="7" height="7" rx="1"/>
          <rect x="14" y="3" width="7" height="7" rx="1"/>
          <rect x="3" y="14" width="7" height="7" rx="1"/>
          <rect x="14" y="14" width="7" height="7" rx="1"/>
        </svg>
      </div>
      <span class="brand-name">CNSS<span class="brand-accent">&nbsp;Dashboard</span></span>
    </a>

    <div class="header-divider"></div>

    <!-- Navigation -->
    <nav class="header-nav">
      <a routerLink="/dashboard" routerLinkActive="active" class="nav-item">
        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>
          <polyline points="9 22 9 12 15 12 15 22"/>
        </svg>
        <span>Tableau de bord</span>
      </a>
      <a routerLink="/centres" routerLinkActive="active" class="nav-item">
        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M3 21h18"/>
          <path d="M5 21V7l7-4 7 4v14"/>
          <path d="M9 10h2v4H9zm4 0h2v4h-2z"/>
        </svg>
        <span>Centres</span>
      </a>
      <a routerLink="/declarations" routerLinkActive="active" class="nav-item">
        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
          <polyline points="14 2 14 8 20 8"/>
          <line x1="16" y1="13" x2="8" y2="13"/>
          <line x1="16" y1="17" x2="8" y2="17"/>
          <polyline points="10 9 9 9 8 9"/>
        </svg>
        <span>D&#233;clarations</span>
      </a>
    </nav>

    <!-- Spacer -->
    <div class="header-spacer"></div>

    <!-- Right side -->
    <div class="header-right">
      <div class="header-badge">Administration</div>
      <div class="user-avatar" title="Utilisateur">A</div>
    </div>
  </header>

  <main class="main-content">
    <router-outlet />
  </main>
</div>
